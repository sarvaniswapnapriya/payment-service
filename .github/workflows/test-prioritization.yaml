name: Testkube AI Trigger
on:
  push:
    branches: [ main ]
    paths:
      - 'payment/services/payment-service/**' # Only triggers on payment changes

jobs:
  trigger-testkube:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Testkube
        uses: kubeshop/setup-testkube@v1
        with:
          organization: ${{ secrets.TK_ORG_ID }}
          environment: ${{ secrets.TK_ENV_ID }}
          token: ${{ secrets.TK_API_TOKEN }}

      - name: Run Orchestrator
        run: |
          testkube run workflow payment-analysis-orchestrator \
          --variable GITHUB_SHA=${{ github.sha }} \
          --variable CHANGED_SERVICE=payment-gateway
